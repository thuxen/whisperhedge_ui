<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset - WhisperHedge</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 400px;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        p {
            color: #666;
            font-size: 16px;
        }
        .error {
            color: #d32f2f;
            background: #ffebee;
            padding: 15px;
            border-radius: 6px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Password Reset</h1>
        <div class="spinner"></div>
        <p id="status">Processing your password reset link...</p>
        <div id="error" class="error" style="display: none;"></div>
    </div>

    <script>
        (function() {
            const statusEl = document.getElementById('status');
            const errorEl = document.getElementById('error');
            
            try {
                // Extract tokens from URL hash
                const hash = window.location.hash.substring(1);
                console.log('[REDIRECT] Hash:', hash ? 'present' : 'missing');
                
                if (!hash) {
                    throw new Error('No reset token found in URL');
                }
                
                // Parse hash parameters
                const params = new URLSearchParams(hash);
                const accessToken = params.get('access_token');
                const refreshToken = params.get('refresh_token');
                const type = params.get('type');
                
                console.log('[REDIRECT] Tokens found:', {
                    access: !!accessToken,
                    refresh: !!refreshToken,
                    type: type
                });
                
                if (!accessToken || !refreshToken) {
                    throw new Error('Invalid reset link - missing tokens');
                }
                
                // Build redirect URL with tokens as query parameters
                const redirectUrl = new URL('/password-reset', window.location.origin);
                redirectUrl.searchParams.set('access_token', accessToken);
                redirectUrl.searchParams.set('refresh_token', refreshToken);
                if (type) {
                    redirectUrl.searchParams.set('type', type);
                }
                
                console.log('[REDIRECT] Redirecting to:', redirectUrl.pathname);
                statusEl.textContent = 'Redirecting to password reset page...';
                
                // Redirect after brief delay to show message
                setTimeout(() => {
                    window.location.href = redirectUrl.toString();
                }, 500);
                
            } catch (error) {
                console.error('[REDIRECT] Error:', error);
                errorEl.textContent = error.message || 'Invalid or expired reset link';
                errorEl.style.display = 'block';
                statusEl.textContent = 'Unable to process reset link';
                
                // Redirect to forgot password page after 3 seconds
                setTimeout(() => {
                    window.location.href = '/forgot-password';
                }, 3000);
            }
        })();
    </script>
</body>
</html>
